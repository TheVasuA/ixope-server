services:
  db:
    image: postgres:16-alpine
    container_name: ixope_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ixope
      POSTGRES_PASSWORD: ixope123
      POSTGRES_DB: ixope_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ixope -d ixope_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ixope_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: ixope_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ixope:ixope123@db:5432/ixope_db
      REDIS_URL: redis://redis:6379/1
    volumes:
      - uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: ixope_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - uploads:/var/www/uploads:ro

volumes:
  pgdata:
  redisdata:
  uploads:
